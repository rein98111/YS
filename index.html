<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify-YT Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">Spotify-YT</div>
            <div class="menu-item active">首頁</div>
            <div class="search-box">
                <input type="text" id="query" placeholder="搜尋音樂...">
                <button id="search-btn">搜尋</button>
            </div>
            <div id="playlist" class="playlist"></div>
        </nav>

        <main class="main-view">
            <header>專屬推薦</header>
            <div id="recommendations" class="card-grid">
                </div>
            <div id="player"></div> </main>

        <footer class="player-bar">
            <div class="current-track">
                <img id="track-thumb" src="https://via.placeholder.com/56" alt="">
                <div class="track-info">
                    <div id="track-title" class="title">尚未播放</div>
                    <div id="track-channel" class="artist">選擇音樂開始</div>
                </div>
            </div>

            <div class="player-controls">
                <div class="btns">
                    <button id="repeat-btn" class="control-icon" title="重複播放">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11 5.466V4H5a4 4 0 0 0-3.584 5.777.5.5 0 1 1-.896.446A5 5 0 0 1 5 3h6V1.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384l-2.36 1.966a.25.25 0 0 1-.41-.192Zm-5 5.068V12h6a4 4 0 0 0 3.585-5.777.5.5 0 1 1 .894-.446A5 5 0 0 1 11 13H5v1.466a.25.25 0 0 1-.41.192l-2.36-1.966a.25.25 0 0 1 0-.384l2.36-1.966a.25.25 0 0 1 .41.192Z"/>
                        </svg>
                    </button>
                    <button id="play-pause-btn" class="main-play-btn">
                        <svg id="play-pause-icon" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                        </svg>
                    </button>
                </div>
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-bar" value="0" min="0" max="100">
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="volume-controls">
                <svg width="16" height="16" fill="#b3b3b3" viewBox="0 0 16 16"><path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/></svg>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
